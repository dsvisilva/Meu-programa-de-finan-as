<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinhasFinanças</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface2: #f0f2f5;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a2e;
    --muted: #6b7280;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --blue: #3b82f6;
    --blue-bg: #eff6ff;
    --purple: #8b5cf6;
    --purple-bg: #f5f3ff;
    --amber: #f59e0b;
    --amber-bg: #fffbeb;
    --radius: 12px;
    --radius-sm: 8px;
  }
  [data-theme="dark"] {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: rgba(255,255,255,0.1);
    --text: #f1f5f9;
    --muted: #94a3b8;
    --green-bg: #064e3b;
    --red-bg: #7f1d1d;
    --blue-bg: #1e3a5f;
    --purple-bg: #3b1d6e;
    --amber-bg: #78350f;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 700; color: var(--blue); display: flex; align-items: center; gap: 6px; }
  .logo span { font-size: 20px; }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .sync-status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .icon-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--text); transition: background 0.15s; }
  .icon-btn:hover { background: var(--surface2); }

  /* Nav */
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; overflow-x: auto; padding: 0 1rem; gap: 0; }
  .nav::-webkit-scrollbar { display: none; }
  .nav-item { flex-shrink: 0; padding: 12px 16px; font-size: 14px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .nav-item.active { color: var(--blue); border-bottom-color: var(--blue); }
  .nav-item:hover:not(.active) { color: var(--text); }

  /* Main */
  .main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* Cards de resumo */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
  .summary-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-value { font-size: 22px; font-weight: 700; }
  .summary-value.green { color: var(--green); }
  .summary-value.red { color: var(--red); }
  .summary-value.blue { color: var(--blue); }
  .summary-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Seção */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.5rem; overflow: hidden; }
  .section-header { padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .section-title { font-size: 15px; font-weight: 600; }

  /* Botão */
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none; }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { filter: brightness(1.1); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Lista de transações */
  .tx-list { list-style: none; }
  .tx-item { display: flex; align-items: center; gap: 12px; padding: 12px 1.25rem; border-bottom: 1px solid var(--border); transition: background 0.1s; }
  .tx-item:last-child { border-bottom: none; }
  .tx-item:hover { background: var(--surface2); }
  .tx-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 12px; color: var(--muted); }
  .tx-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .tx-delete { opacity: 0; background: none; border: none; cursor: pointer; color: var(--red); font-size: 16px; padding: 4px; border-radius: 4px; }
  .tx-item:hover .tx-delete { opacity: 1; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); transform: scale(0.95); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-header { padding: 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 16px; font-weight: 600; }
  .modal-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 1rem 1.25rem; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: var(--blue); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { padding: 8px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; color: var(--muted); }
  .type-btn.active-income { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .type-btn.active-expense { border-color: var(--red); background: var(--red-bg); color: var(--red); }

  /* Gráfico de barras simples */
  .bar-chart { padding: 1rem 1.25rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .bar-fill.income { background: var(--green); }
  .bar-fill.expense { background: var(--red); }
  .bar-val { font-size: 12px; font-weight: 600; min-width: 70px; }

  /* Meta/Orçamento */
  .budget-item { padding: 12px 1.25rem; border-bottom: 1px solid var(--border); }
  .budget-item:last-child { border-bottom: none; }
  .budget-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .budget-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .budget-values { font-size: 12px; color: var(--muted); }
  .budget-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .budget-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  /* Toast */
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: var(--radius-sm); font-size: 14px; z-index: 300; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Vazio */
  .empty { padding: 3rem 1rem; text-align: center; color: var(--muted); font-size: 14px; }
  .empty-icon { font-size: 40px; margin-bottom: 8px; }

  /* Categoria badges */
  .cat-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }

  /* Responsivo mobile */
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .tx-delete { opacity: 1; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><span>💰</span> MinhasFinanças</div>
  <div class="header-actions">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Sincronizado</span>
    </div>
    <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
  </div>
</div>

<div class="nav">
  <div class="nav-item active" onclick="showTab('dashboard', this)">📊 Visão Geral</div>
  <div class="nav-item" onclick="showTab('transactions', this)">💳 Transações</div>
  <div class="nav-item" onclick="showTab('budgets', this)">🎯 Orçamentos</div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div id="tab-dashboard">
    <div class="summary-grid" id="summaryCards"></div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Receitas e Despesas (últimos meses)</span>
      </div>
      <div class="bar-chart" id="monthlyChart"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Últimas transações</span>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Adicionar</button>
      </div>
      <ul class="tx-list" id="recentList"></ul>
    </div>
  </div>

  <!-- TRANSAÇÕES -->
  <div id="tab-transactions" style="display:none">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Todas as transações</span>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Adicionar</button>
      </div>
      <div style="padding: 12px 1.25rem; border-bottom: 1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap;">
        <select id="filterType" onchange="renderTransactions()" style="padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:13px;">
          <option value="">Todos os tipos</option>
          <option value="income">Receitas</option>
          <option value="expense">Despesas</option>
        </select>
        <select id="filterCat" onchange="renderTransactions()" style="padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:13px;">
          <option value="">Todas as categorias</option>
        </select>
        <select id="filterMonth" onchange="renderTransactions()" style="padding:6px 10px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:13px;">
          <option value="">Todos os meses</option>
        </select>
      </div>
      <ul class="tx-list" id="allTxList"></ul>
    </div>
  </div>

  <!-- ORÇAMENTOS -->
  <div id="tab-budgets" style="display:none">
    <div class="section">
      <div class="section-header">
        <span class="section-title">Orçamentos por categoria</span>
        <button class="btn btn-primary btn-sm" onclick="openBudgetModal()">+ Definir orçamento</button>
      </div>
      <div id="budgetList"></div>
    </div>
  </div>

</div>

<!-- Modal adicionar transação -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Nova transação</span>
      <button class="icon-btn" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Tipo</label>
        <div class="type-toggle">
          <button class="type-btn active-income" id="btn-income" onclick="setType('income')">+ Receita</button>
          <button class="type-btn" id="btn-expense" onclick="setType('expense')">− Despesa</button>
        </div>
      </div>
      <div class="field">
        <label>Descrição</label>
        <input type="text" id="tx-desc" placeholder="Ex: Salário, Mercado..." />
      </div>
      <div class="field">
        <label>Valor (R$)</label>
        <input type="number" id="tx-amount" placeholder="0,00" step="0.01" min="0" />
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="tx-cat">
          <option value="">Selecione...</option>
        </select>
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="tx-date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTransaction()">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal orçamento -->
<div class="modal-overlay" id="budgetModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Definir orçamento mensal</span>
      <button class="icon-btn" onclick="closeModal('budgetModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Categoria</label>
        <select id="budget-cat"></select>
      </div>
      <div class="field">
        <label>Limite mensal (R$)</label>
        <input type="number" id="budget-amount" placeholder="0,00" step="0.01" min="0" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('budgetModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveBudget()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'financas_data_v2';
const SYNC_INTERVAL = 4000;

const CATEGORIES = {
  income: [
    { id: 'salario', label: 'Salário', icon: '💼' },
    { id: 'freelance', label: 'Freelance', icon: '💻' },
    { id: 'investimento', label: 'Investimento', icon: '📈' },
    { id: 'aluguel_rec', label: 'Aluguel recebido', icon: '🏠' },
    { id: 'outros_rec', label: 'Outros', icon: '✨' },
  ],
  expense: [
    { id: 'moradia', label: 'Moradia', icon: '🏠' },
    { id: 'alimentacao', label: 'Alimentação', icon: '🍽️' },
    { id: 'transporte', label: 'Transporte', icon: '🚗' },
    { id: 'saude', label: 'Saúde', icon: '💊' },
    { id: 'lazer', label: 'Lazer', icon: '🎮' },
    { id: 'educacao', label: 'Educação', icon: '📚' },
    { id: 'vestuario', label: 'Vestuário', icon: '👗' },
    { id: 'streaming', label: 'Streaming', icon: '📺' },
    { id: 'outros_exp', label: 'Outros', icon: '📦' },
  ]
};

let state = { transactions: [], budgets: {}, theme: 'light' };
let currentType = 'income';
let syncing = false;

function fmt(val) {
  return 'R$ ' + parseFloat(val || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function getMonthKey(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
}

function getCatInfo(catId) {
  const all = [...CATEGORIES.income, ...CATEGORIES.expense];
  return all.find(c => c.id === catId) || { label: catId, icon: '📌' };
}

// Storage persistente
async function loadData() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      state = { ...state, ...JSON.parse(result.value) };
    }
  } catch(e) {}
  applyTheme();
  renderAll();
  setInterval(syncData, SYNC_INTERVAL);
}

async function saveData() {
  setSyncing(true);
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
  } catch(e) {}
  setTimeout(() => setSyncing(false), 600);
}

async function syncData() {
  try {
    const result = await window.storage.get(STORAGE_KEY, true);
    if (result && result.value) {
      const remote = JSON.parse(result.value);
      if (JSON.stringify(remote) !== JSON.stringify(state)) {
        state = { ...state, ...remote };
        applyTheme();
        renderAll();
        showToast('📡 Dados sincronizados!');
      }
    }
  } catch(e) {}
}

function setSyncing(val) {
  syncing = val;
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot' + (val ? ' syncing' : '');
  txt.textContent = val ? 'Sincronizando...' : 'Sincronizado';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Theme
function toggleTheme() {
  state.theme = state.theme === 'light' ? 'dark' : 'light';
  applyTheme();
  saveData();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme || 'light');
}

// Tabs
function showTab(tab, el) {
  ['dashboard','transactions','budgets'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if (tab === 'transactions') { populateFilters(); renderTransactions(); }
  if (tab === 'budgets') renderBudgets();
}

// Modal helpers
function openAddModal() {
  setType('income');
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-date').value = new Date().toISOString().slice(0,10);
  populateCatSelect();
  document.getElementById('addModal').classList.add('open');
}
function openBudgetModal() {
  const sel = document.getElementById('budget-cat');
  sel.innerHTML = CATEGORIES.expense.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
  document.getElementById('budget-amount').value = '';
  document.getElementById('budgetModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function setType(type) {
  currentType = type;
  document.getElementById('btn-income').className = 'type-btn' + (type==='income' ? ' active-income' : '');
  document.getElementById('btn-expense').className = 'type-btn' + (type==='expense' ? ' active-expense' : '');
  populateCatSelect();
}
function populateCatSelect() {
  const sel = document.getElementById('tx-cat');
  sel.innerHTML = '<option value="">Selecione...</option>' + CATEGORIES[currentType].map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
}

function saveTransaction() {
  const desc = document.getElementById('tx-desc').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const cat = document.getElementById('tx-cat').value;
  const date = document.getElementById('tx-date').value;
  if (!desc || !amount || amount <= 0 || !cat || !date) { showToast('⚠️ Preencha todos os campos'); return; }
  state.transactions.push({ id: Date.now().toString(), type: currentType, desc, amount, cat, date });
  state.transactions.sort((a,b) => b.date.localeCompare(a.date));
  closeModal('addModal');
  saveData();
  renderAll();
  showToast('✅ Transação salva!');
}

function deleteTransaction(id) {
  state.transactions = state.transactions.filter(t => t.id !== id);
  saveData();
  renderAll();
  showToast('🗑️ Removida');
}

function saveBudget() {
  const cat = document.getElementById('budget-cat').value;
  const amount = parseFloat(document.getElementById('budget-amount').value);
  if (!cat || !amount || amount <= 0) { showToast('⚠️ Preencha os campos'); return; }
  if (!state.budgets) state.budgets = {};
  state.budgets[cat] = amount;
  closeModal('budgetModal');
  saveData();
  renderBudgets();
  showToast('✅ Orçamento definido!');
}

function deleteBudget(cat) {
  delete state.budgets[cat];
  saveData();
  renderBudgets();
  showToast('🗑️ Orçamento removido');
}

// Render
function renderAll() {
  renderSummary();
  renderChart();
  renderRecent();
}

function renderSummary() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const txMonth = state.transactions.filter(t => t.date.startsWith(thisMonth));
  const income = txMonth.filter(t => t.type==='income').reduce((s,t) => s+t.amount, 0);
  const expense = txMonth.filter(t => t.type==='expense').reduce((s,t) => s+t.amount, 0);
  const balance = income - expense;
  const total = state.transactions.reduce((s,t) => t.type==='income' ? s+t.amount : s-t.amount, 0);
  const month = now.toLocaleDateString('pt-BR',{month:'long'});

  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card">
      <div class="summary-label">Saldo total</div>
      <div class="summary-value ${total>=0?'blue':'red'}">${fmt(total)}</div>
      <div class="summary-sub">Acumulado</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Receitas (${month})</div>
      <div class="summary-value green">${fmt(income)}</div>
      <div class="summary-sub">${txMonth.filter(t=>t.type==='income').length} transações</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Despesas (${month})</div>
      <div class="summary-value red">${fmt(expense)}</div>
      <div class="summary-sub">${txMonth.filter(t=>t.type==='expense').length} transações</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Resultado (${month})</div>
      <div class="summary-value ${balance>=0?'green':'red'}">${fmt(balance)}</div>
      <div class="summary-sub">${balance>=0?'Superávit':'Déficit'}</div>
    </div>
  `;
}

function renderChart() {
  const months = {};
  state.transactions.forEach(t => {
    const k = t.date.slice(0,7);
    if (!months[k]) months[k] = { income: 0, expense: 0 };
    months[k][t.type] += t.amount;
  });
  const keys = Object.keys(months).sort().slice(-6);
  if (!keys.length) { document.getElementById('monthlyChart').innerHTML = '<div class="empty"><div class="empty-icon">📊</div>Nenhum dado ainda</div>'; return; }
  const maxVal = Math.max(...keys.map(k => Math.max(months[k].income, months[k].expense)), 1);
  document.getElementById('monthlyChart').innerHTML = keys.map(k => {
    const d = new Date(k + '-01');
    const label = d.toLocaleDateString('pt-BR',{month:'short', year:'2-digit'});
    const ip = (months[k].income/maxVal*100).toFixed(1);
    const ep = (months[k].expense/maxVal*100).toFixed(1);
    return `
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${label}</div>
        <div class="bar-row" style="margin-bottom:4px">
          <div class="bar-label" style="color:var(--green);font-size:11px">Receita</div>
          <div class="bar-track"><div class="bar-fill income" style="width:${ip}%"></div></div>
          <div class="bar-val" style="color:var(--green)">${fmt(months[k].income)}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label" style="color:var(--red);font-size:11px">Despesa</div>
          <div class="bar-track"><div class="bar-fill expense" style="width:${ep}%"></div></div>
          <div class="bar-val" style="color:var(--red)">${fmt(months[k].expense)}</div>
        </div>
      </div>`;
  }).join('');
}

function txHTML(t) {
  const cat = getCatInfo(t.cat);
  const d = new Date(t.date + 'T00:00:00').toLocaleDateString('pt-BR');
  const bg = t.type==='income' ? 'var(--green-bg)' : 'var(--red-bg)';
  return `<li class="tx-item">
    <div class="tx-icon" style="background:${bg}">${cat.icon}</div>
    <div class="tx-info">
      <div class="tx-desc">${t.desc}</div>
      <div class="tx-meta">${cat.label} · ${d}</div>
    </div>
    <div class="tx-amount ${t.type==='income'?'income':'expense'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
    <button class="tx-delete" onclick="deleteTransaction('${t.id}')" title="Remover">🗑</button>
  </li>`;
}

function renderRecent() {
  const list = document.getElementById('recentList');
  const recent = state.transactions.slice(0,5);
  list.innerHTML = recent.length ? recent.map(txHTML).join('') : '<div class="empty"><div class="empty-icon">💳</div>Nenhuma transação ainda<br><br><button class="btn btn-primary" onclick="openAddModal()">Adicionar primeira transação</button></div>';
}

function populateFilters() {
  const cats = new Set(state.transactions.map(t => t.cat));
  const catSel = document.getElementById('filterCat');
  catSel.innerHTML = '<option value="">Todas as categorias</option>' + [...cats].map(c => { const i = getCatInfo(c); return `<option value="${c}">${i.icon} ${i.label}</option>`; }).join('');

  const months = [...new Set(state.transactions.map(t => t.date.slice(0,7)))].sort().reverse();
  const mSel = document.getElementById('filterMonth');
  mSel.innerHTML = '<option value="">Todos os meses</option>' + months.map(m => { const d = new Date(m+'-01'); return `<option value="${m}">${d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</option>`; }).join('');
}

function renderTransactions() {
  const type = document.getElementById('filterType').value;
  const cat = document.getElementById('filterCat').value;
  const month = document.getElementById('filterMonth').value;
  let txs = state.transactions;
  if (type) txs = txs.filter(t => t.type === type);
  if (cat) txs = txs.filter(t => t.cat === cat);
  if (month) txs = txs.filter(t => t.date.startsWith(month));
  const list = document.getElementById('allTxList');
  list.innerHTML = txs.length ? txs.map(txHTML).join('') : '<div class="empty"><div class="empty-icon">🔍</div>Nenhuma transação encontrada</div>';
}

function renderBudgets() {
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const expenses = {};
  state.transactions.filter(t => t.type==='expense' && t.date.startsWith(thisMonth)).forEach(t => {
    expenses[t.cat] = (expenses[t.cat]||0) + t.amount;
  });
  const b = state.budgets || {};
  const container = document.getElementById('budgetList');
  if (!Object.keys(b).length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎯</div>Nenhum orçamento definido<br><br><button class="btn btn-primary" onclick="openBudgetModal()">Definir primeiro orçamento</button></div>';
    return;
  }
  container.innerHTML = Object.entries(b).map(([cat, limit]) => {
    const spent = expenses[cat] || 0;
    const pct = Math.min((spent/limit)*100, 100);
    const info = getCatInfo(cat);
    const over = spent > limit;
    const color = over ? 'var(--red)' : pct > 75 ? 'var(--amber)' : 'var(--green)';
    return `<div class="budget-item">
      <div class="budget-top">
        <div class="budget-name">${info.icon} ${info.label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="budget-values" style="color:${color};font-weight:600">${fmt(spent)} / ${fmt(limit)}</div>
          <button class="btn btn-ghost btn-sm" onclick="deleteBudget('${cat}')" title="Remover">🗑</button>
        </div>
      </div>
      <div class="budget-bar-track">
        <div class="budget-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
      ${over ? `<div style="font-size:11px;color:var(--red);margin-top:4px">⚠️ Limite ultrapassado em ${fmt(spent-limit)}</div>` : ''}
    </div>`;
  }).join('');
}

// Fechar modal clicando fora
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

loadData();
</script>
</body>
</html>
